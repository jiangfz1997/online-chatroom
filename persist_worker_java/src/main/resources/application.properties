spring.application.name=persist-worker

# No web server needed for a background worker
spring.main.web-application-type=none

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=5000ms

# DynamoDB
aws.dynamodb.endpoint=http://localhost:8000
aws.dynamodb.region=us-west-2

# How often to drain the persist queue (milliseconds)
# Matches Go version's PERSISTTICKER env var (default 30s)
persist.interval-ms=30000

# Max messages to pop per room per tick (matches Go version's loop limit)
persist.batch-size=100
