spring.application.name=persist-worker

# Minimal embedded web server, needed only to expose /actuator/prometheus (M2a instrumentation).
# Not port 8080/8081/8082 (api-server / ws1 / ws2).
server.port=8090

# Metrics: Micrometer -> Actuator /actuator/prometheus (scraped by loadtest Prometheus)
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=5000ms

# DynamoDB
aws.dynamodb.endpoint=http://localhost:8000
aws.dynamodb.region=us-west-2

# How often to drain the persist queue (milliseconds)
# Matches Go version's PERSISTTICKER env var (default 30s)
persist.interval-ms=30000

# Max messages to pop per room per tick (matches Go version's loop limit)
persist.batch-size=100
