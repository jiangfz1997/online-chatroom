spring.application.name=ws-server
server.port=8081

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=5000ms

# DynamoDB
aws.dynamodb.endpoint=http://localhost:8000
aws.dynamodb.region=us-west-2

# JWT (must match api-server secret)
jwt.secret=your-secret-key-change-this-in-production
jwt.expiration=86400000

# Kafka
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
kafka.topic=chat_messages
# Shared consumer group across all ws-server instances — Kafka's partition assignment
# spreads message processing instead of fanning every message out to every instance.
kafka.group.id=ws-server-group
# Partition count for chat_messages. NOTE: only takes effect on first topic creation;
# an existing topic must be repartitioned manually (kafka-topics.sh --alter).
kafka.topic.partitions=3

# Unique ID per ws-server instance (routing table / heartbeat identity, decoupled from Kafka group)
server.id=ws-java-1

# Virtual threads (Java 21)
spring.threads.virtual.enabled=true

# Redis recent-message list size
redis.message.recent-count=50
# Redis TTL in seconds for room message lists
redis.message.ttl-seconds=86400
