# Kubelet image credential provider config.
# Deploy to the k3s node at /var/lib/rancher/credentialprovider/config.yaml
# (referenced by the kubelet-arg image-credential-provider-config).
#
# Lets kubelet fetch short-lived ECR pull credentials automatically via the
# EC2 instance role — no imagePullSecret, nothing to expire.
apiVersion: kubelet.config.k8s.io/v1
kind: CredentialProviderConfig
providers:
  - name: ecr-credential-provider
    matchImages:
      - "492832370104.dkr.ecr.us-east-1.amazonaws.com"
      - "*.dkr.ecr.*.amazonaws.com"
    defaultCacheDuration: "12h"
    apiVersion: credentialprovider.kubelet.k8s.io/v1
    args:
      - get-credentials
    env:
      - name: AWS_REGION
        value: us-east-1
