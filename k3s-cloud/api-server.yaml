apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
      - name: api-server
        image: 492832370104.dkr.ecr.us-east-1.amazonaws.com/chatroom-api-server:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATA_REDIS_HOST
          value: redis
        - name: AWS_DYNAMODB_REGION
          value: "us-east-1"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: chatroom-secrets
              key: jwt-secret
        - name: JAVA_TOOL_OPTIONS
          value: "-Xms128m -Xmx256m -XX:+UseContainerSupport"
        resources:
          requests:
            memory: "200Mi"
            cpu: "100m"
          limits:
            memory: "320Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
spec:
  selector:
    app: api-server
  ports:
  - port: 8080
