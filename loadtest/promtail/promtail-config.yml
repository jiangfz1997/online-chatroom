server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# Tails the FILE_JSON logback appender's output, bind-mounted from
# docker-compose.loadtest.yml's ws1/ws2/persist-worker containers (see that file's
# ./logs/* volumes). Plain file tailing rather than Docker service discovery/log
# driver — simplest option that doesn't care whether the container runtime is
# Docker Desktop or something else.
scrape_configs:
  - job_name: ws-server-1
    static_configs:
      - targets: [localhost]
        labels:
          service: ws-server
          server_id: ws-java-1
          __path__: /var/log/ws1/*.log

  - job_name: ws-server-2
    static_configs:
      - targets: [localhost]
        labels:
          service: ws-server
          server_id: ws-java-2
          __path__: /var/log/ws2/*.log

  - job_name: persist-worker
    static_configs:
      - targets: [localhost]
        labels:
          service: persist-worker
          __path__: /var/log/persist-worker/*.log
