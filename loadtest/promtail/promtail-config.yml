server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# Dev processes run on the host (mvn spring-boot:run), not as Docker containers, so
# plain file tailing is used here instead of Docker service discovery / log driver
# (the approach the plan uses once services are containerized in docker-compose.loadtest.yml).
scrape_configs:
  - job_name: ws-server
    static_configs:
      - targets: [localhost]
        labels:
          service: ws-server
          __path__: /var/log/ws-server/*.log

  - job_name: persist-worker
    static_configs:
      - targets: [localhost]
        labels:
          service: persist-worker
          __path__: /var/log/persist-worker/*.log
