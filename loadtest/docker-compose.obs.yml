name: loadtest-obs

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: loadtest-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - obs-net

  grafana:
    image: grafana/grafana:11.3.1
    container_name: loadtest-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - obs-net

  loki:
    image: grafana/loki:3.2.1
    container_name: loadtest-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    networks:
      - obs-net

  # Tails the JSON log files ws1/ws2/persist-worker write (see their
  # logback-spring.xml FILE_JSON appender), bind-mounted in from
  # docker-compose.loadtest.yml's ./logs/* volumes.
  promtail:
    image: grafana/promtail:3.2.1
    container_name: loadtest-promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs/ws1:/var/log/ws1:ro
      - ./logs/ws2:/var/log/ws2:ro
      - ./logs/persist-worker:/var/log/persist-worker:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
    networks:
      - obs-net

  # Redis itself has no /metrics endpoint; redis_exporter translates INFO/latency
  # stats into something Prometheus can scrape. Talks to the app's Redis over the
  # host (ws-server/persist-worker run as host processes today, not in this
  # compose project), so no shared Docker network with docker-compose.yml is needed.
  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: loadtest-redis-exporter
    environment:
      REDIS_ADDR: "redis://host.docker.internal:6379"
    ports:
      - "9121:9121"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - obs-net

networks:
  obs-net:
    driver: bridge

volumes:
  loki-data:

# Scrapes ws1/ws2/persist-worker's own /actuator/prometheus over host.docker.internal
# (see prometheus/prometheus.yml) — works the same whether those containers came from
# docker-compose.loadtest.yml or a host-run `mvn spring-boot:run`, since both publish
# the same host ports.
