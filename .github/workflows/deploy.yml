name: Build and Deploy

on:
  push:
    branches: [master]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 492832370104.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC
      contents: read

    strategy:
      matrix:
        include:
          - service: api-server
            ecr_repo: chatroom-api-server
            dockerfile: docker/api-server/Dockerfile
            context: api_server_java
          - service: ws-server
            ecr_repo: chatroom-ws-server
            dockerfile: ws_server_java/Dockerfile
            context: ws_server_java
          - service: persist-worker
            ecr_repo: chatroom-persist-worker
            dockerfile: persist_worker_java/Dockerfile
            context: persist_worker_java

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::492832370104:role/github-actions-chatroom
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push ${{ matrix.service }}
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        push: true
        tags: ${{ env.ECR_REGISTRY }}/${{ matrix.ecr_repo }}:latest
        cache-from: type=gha,scope=${{ matrix.service }}
        cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-backend:
    name: Deploy to k3s
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Install/refresh the ECR pull-secret refresher on the host (idempotent).
          # ECR login tokens expire after 12h; this keeps the imagePullSecret fresh.
          # Uses the EC2 instance role (no keys). Reinstalling each deploy self-heals
          # a rebuilt host; the cron covers the gaps between deploys.
          sudo tee /usr/local/bin/refresh-ecr-secret.sh >/dev/null <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          REGION=us-east-1
          REGISTRY=492832370104.dkr.ecr.us-east-1.amazonaws.com
          TOKEN=$(aws ecr get-login-password --region "$REGION")
          kubectl delete secret ecr-secret --ignore-not-found
          kubectl create secret docker-registry ecr-secret \
            --docker-server="$REGISTRY" --docker-username=AWS --docker-password="$TOKEN"
          SH
          sudo chmod +x /usr/local/bin/refresh-ecr-secret.sh
          echo '0 */8 * * * root /usr/local/bin/refresh-ecr-secret.sh >>/var/log/ecr-refresh.log 2>&1' | sudo tee /etc/cron.d/ecr-refresh >/dev/null

          # Refresh now so the rollout below pulls with a valid token.
          sudo /usr/local/bin/refresh-ecr-secret.sh

          sudo kubectl rollout restart deployment/api-server
          sudo kubectl rollout restart deployment/ws-server
          sudo kubectl rollout restart deployment/persist-worker
          sudo kubectl rollout status deployment/api-server --timeout=180s
          sudo kubectl rollout status deployment/ws-server --timeout=180s
          sudo kubectl rollout status deployment/persist-worker --timeout=180s
          echo "Deploy complete"
          sudo kubectl get pods

  deploy-frontend:
    name: Build & Deploy Frontend to S3
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::492832370104:role/github-actions-chatroom
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: frontend/vue-chat/package-lock.json

    - name: Build frontend
      working-directory: frontend/vue-chat
      env:
        VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        VITE_WS_BASE_URL: ${{ secrets.VITE_WS_BASE_URL }}
      run: |
        npm ci
        npm run build

    - name: Deploy to S3
      run: |
        aws s3 sync frontend/vue-chat/dist s3://${{ secrets.S3_BUCKET }} --delete
